version: 2
updates:
  # Root workspace dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsup"
          - "tsx"
          - "vitest"
          - "@vitest/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
